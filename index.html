<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pollo Loco</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="shortcut icon" href="./img/enemies/chicken/chicken_small/1_walk/2_w.png" type="image/x-icon">
</head>

<body onload="init()">
    <article class="content">
        <header class="title-header">
            <h1>El Pollo Loco</h1>
        </header>

        <main>
            <div class="game-wrapper" id="game_wrapper">
                <canvas class="game-canvas" id="game_canvas"></canvas>

                <div class="controls">
                    <div class="volume-control">
                        <button class="mute_button" onclick="toggleMute(event)">
                            <img id="mute_icon" src="./img/controls/volume_on.png" alt="volume_icon">
                        </button>
                        <input type="range" min="0" max="100" value="50" class="volume-slider" id="volume_slider"
                            onchange="changeVolume(event)">
                    </div>
                    <button onclick="showFullscreen(event)">
                        <img src="./img/controls/open_fullscreen.png" alt="open fullscreen" id="fullscreen_icon">
                    </button>
                </div>
                <div class="action-buttons">
                    <button class="restart-button" id="restart_button" onclick="restartGame(event)">
                        Restart
                    </button>
                    <button class="start-button" id="start_button" onclick="loadLevels()">
                        Start
                    </button>
                    <button class="restart-button" id="menu_button" onclick="showMenu(event)">
                        Menu
                    </button>
                </div>
            </div>

            <p class="start-text">click on the start button above to start</p>
        </main>

        <footer class="controls-display">
            <h2 class="controls-title">controls</h2>
            <div class="controls-description">
                <p>A - Move Left</p>
                <p>D - Move Right</p>
                <p>W - Jump</p>
                <p>F - Throw</p>
                <p>Space - Jump</p>
            </div>
            <aside class="legal-links">
                <a href="./html/impressum.html" target="_blank">Impressum</a>
                <a href="./html/legal_notice.html" target="_blank">Legal notice</a>
            </aside>
        </footer>
    </article>
</body>

<script src="./classes/world.class.js"></script>
<script src="./classes/drawable-objects.class.js"></script>
<script src="./classes/moveable-objects.class.js"></script>
<script src="./classes/throwable-object.class.js"></script>
<script src="./classes/statusbar.class.js"></script>
<script src="./classes/status_bars/bottle_bar.class.js"></script>
<script src="./classes/status_bars/health_bar.class.js"></script>
<script src="./classes/status_bars/coin_bar.class.js"></script>
<script src="./classes/status_bars/boss_bar.class.js"></script>
<script src="./classes/controls.class.js"></script>
<script src="./classes/starter_screen.class.js"></script>
<script src="./classes/end_screen.class.js"></script>
<script src="./classes/background.class.js"></script>
<script src="./classes/bottle_collectable.class.js"></script>
<script src="./classes/coin_collectable.class.js"></script>
<script src="./classes/clouds.class.js"></script>
<script src="./classes/character.class.js"></script>
<script src="./classes/chicken.class.js"></script>
<script src="./classes/small_chicken.class.js"></script>
<script src="./classes/endboss.class.js"></script>
<script src="./classes/game_over.class.js"></script>
<script src="./classes/level.class.js"></script>
<script src="./levels/level1.js"></script>
<script src="./levels/level2.js"></script>
<script src="./scripts/script.js"></script>


</html>
